<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Ultra - 50+ Products</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2874f0;
            --secondary: #ff9f00;
            --success: #28a745;
            --danger: #ff6161;
            --bg: #f1f3f6;
            --white: #fff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 12px 40px rgba(0,0,0,0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header - Ultra Smooth */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #1e5bc6 100%);
            color: white;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            transform: translateZ(0);
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 25px;
            animation: slideDown 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo i {
            font-size: 36px;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 50%;
            backdrop-filter: blur(10px);
        }

        .search-box {
            flex: 1;
            max-width: 550px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 16px 20px 16px 55px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow);
        }

        #searchInput:focus {
            outline: none;
            box-shadow: 0 8px 30px rgba(40,116,240,0.3);
            transform: scale(1.02);
        }

        .search-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--secondary);
            border: none;
            padding: 12px 18px;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .login-btn, .cart-icon {
            padding: 12px 20px;
            background: rgba(255,255,255,0.15);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .login-btn:hover, .cart-icon:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px) scale(1.05);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(255,97,97,0.4);
            animation: bounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.2); }
        }

        /* Filters */
        .filters {
            background: var(--white);
            padding: 20px 0;
            margin: 20px 0;
            border-radius: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .filter-tabs {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .filter-tabs::-webkit-scrollbar { display: none; }

        .filter-tab {
            padding: 14px 28px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            white-space: nowrap;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateZ(0);
        }

        .filter-tab:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .filter-tab.active {
            background: linear-gradient(135deg, var(--primary), #1e5bc6);
            color: white;
            box-shadow: var(--shadow);
            transform: translateY(-3px);
        }

        /* Products Grid - ULTRA SMOOTH */
        .products-section {
            padding: 40px 0;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            transform: translateZ(0);
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            will-change: transform;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info {
            padding: 25px;
        }

        .product-title {
            font-size: 16px;
            color: #212121;
            margin-bottom: 15px;
            line-height: 1.4;
            height: 48px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            font-weight: 600;
        }

        .product-price {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .current-price {
            font-size: 22px;
            font-weight: 800;
            color: #212121;
        }

        .original-price {
            font-size: 16px;
            text-decoration: line-through;
            color: #999;
        }

        .discount {
            background: linear-gradient(135deg, #388e3c, #2e7d32);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary);
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .add-to-cart {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--secondary), #e68a00);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .add-to-cart::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .add-to-cart:hover::before {
            left: 100%;
        }

        .add-to-cart:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 35px rgba(255,159,0,0.4);
        }

        /* Modals - Ultra Smooth */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            width: 95%;
            max-width: 700px;
            max-height: 90vh;
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .modal.active .modal-content {
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            padding: 30px 35px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }

        .close-modal {
            font-size: 28px;
            cursor: pointer;
            color: #666;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: #f0f0f0;
            color: #333;
            transform: rotate(90deg) scale(1.1);
        }

        .cart-items {
            max-height: 500px;
            overflow-y: auto;
            padding: 30px 35px;
            scrollbar-width: thin;
            scrollbar-color: #ddd transparent;
        }

        .cart-items::-webkit-scrollbar {
            width: 6px;
        }

        .cart-items::-webkit-scrollbar-track {
            background: transparent;
        }

        .cart-items::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .cart-item {
            display: flex;
            gap: 25px;
            padding: 25px 0;
            border-bottom: 1px solid #f5f5f5;
            align-items: flex-start;
            transition: all 0.3s;
            transform: translateZ(0);
        }

        .cart-item:hover {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin: 0 -35px;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .cart-item-info h4 {
            margin-bottom: 10px;
            font-size: 17px;
            color: #212121;
            font-weight: 600;
        }

        .cart-item-price {
            font-weight: 800;
            color: #212121;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .quantity-btn {
            width: 42px;
            height: 42px;
            border: 2px solid #e0e0e0;
            background: var(--white);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .quantity-btn:hover {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .remove-item {
            background: linear-gradient(135deg, var(--danger), #e55353);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .remove-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255,97,97,0.4);
        }

        .cart-total {
            padding: 30px 35px;
            border-top: 3px solid #e8e8e8;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }

        .cart-total h4 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #212121;
            font-weight: 800;
        }

        .checkout-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, var(--primary), #1e5bc6);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .checkout-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .checkout-btn:hover::before {
            left: 100%;
        }

        .checkout-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 50px rgba(40,116,240,0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 20px;
            }
            .header-top { flex-direction: column; gap: 20px; }
            .search-box { max-width: 100%; order: 3; }
        }
    </style>
</head>

        };

        // Init
        document.addEventListener('DOMContentLoaded', () => {

            updateCartUI();
            setupEvents();

        function setupEvents() {
            el.searchInput.addEventListener('input', debounce(handleSearch, 300));
            el.filterTabs.forEach(tab => tab.addEventListener('click', handleFilter));
            el.cartIcon.addEventListener('click', toggleCart);
            el.closeCart.addEventListener('click', closeCart);
            el.checkoutBtn.addEventListener('click', handleCheckout);
        }

        // Debounce for smooth search
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function renderProducts(productsToRender = currentProducts) {

            updateCartUI();
            animateCart();

<script>
function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
}

function updateCartUI() {
    const count = cart.reduce((t, item) => t + item.quantity, 0);
    el.cartCount.textContent = count;
}

function renderCart() {
    if (cart.length === 0) {
        el.cartItems.innerHTML = `
            <div style="text-align:center;padding:40px;">
                <h3>Your cart is empty 🛒</h3>
            </div>
        `;
        el.cartTotal.textContent = 0;
        return;
    }

    el.cartItems.innerHTML = cart.map(item => `
        <div class="cart-item">
            <img src="${item.image}" class="cart-item-image">
            <div class="cart-item-info">
                <h4>${item.name}</h4>
                <div class="cart-item-price">
                    ₹${item.price.toLocaleString()}
                </div>

                <div class="quantity-controls">
                    <button class="quantity-btn"
                        onclick="changeQty(${item.id}, -1)">
                        -
                    </button>

                    <span>${item.quantity}</span>

                    <button class="quantity-btn"
                        onclick="changeQty(${item.id}, 1)">
                        +
                    </button>
                </div>

                <button class="remove-item"
                    onclick="removeItem(${item.id})">
                    Remove
                </button>
            </div>
        </div>
    `).join('');

    const total = cart.reduce(
        (t, item) => t + item.price * item.quantity,
        0
    );

    el.cartTotal.textContent = total.toLocaleString();
}

function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);

    if (!item) return;

    item.quantity += delta;

    if (item.quantity <= 0) {
        cart = cart.filter(i => i.id !== id);
    }

    saveCart();
    updateCartUI();
    renderCart();
}

function removeItem(id) {
    cart = cart.filter(i => i.id !== id);

    saveCart();
    updateCartUI();
    renderCart();
}

function handleCheckout() {
    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    alert("🎉 Order Placed Successfully!");

    cart = [];

    saveCart();
    updateCartUI();
    renderCart();

    closeCart();
}

function showProduct(id) {
    const product = products.find(p => p.id === id);

    alert(
        `${product.name}\n\n` +
        `Price: ₹${product.price.toLocaleString()}\n` +
        `Rating: ⭐ ${product.rating}`
    );
}

// Login Button
document.querySelector('.login-btn')
.addEventListener('click', () => {
    const name = prompt("Enter your name");

    if (name) {
        localStorage.setItem('user', name);
        document.querySelector('.login-btn').innerHTML =
            `👋 ${name}`;
    }
});

// Auto login restore
window.addEventListener('load', () => {
    const user = localStorage.getItem('user');

    if (user) {
        document.querySelector('.login-btn').innerHTML =
            `👋 ${user}`;
    }
});

// Close modal outside click
window.addEventListener('click', e => {
    if (e.target === el.cartModal) {
        closeCart();
    }
});
</script>
